name: Deploy Frontend Vue a AWS EC2

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: 3. Instalar dependencias
        run: npm ci

      - name: 4. Escanear y corregir IPs/Puertos en el código Vue
        run: |
          echo "Limpiando referencias antiguas o incorrectas..."
          
          # Cambiar localhost por el dominio
          find src/ -type f \( -name "*.js" -o -name "*.vue" \) -exec sed -i 's/localhost/${{ secrets.BACKEND_IP }}/g' {} +
          
          # Cambiar IP antigua por el dominio
          find src/ -type f \( -name "*.js" -o -name "*.vue" \) -exec sed -i 's/3.81.245.213/${{ secrets.BACKEND_IP }}/g' {} +
          
          # ¡VITAL! Borrar el puerto :5678 de cualquier archivo Vue para forzar HTTPS por el puerto 443
          find src/ -type f \( -name "*.js" -o -name "*.vue" \) -exec sed -i 's/:5678//g' {} +

      - name: 4.5. Forzar variables de entorno correctas (Puro HTTPS)
        run: |
          # API
          echo "VITE_API_URL=https://${{ secrets.BACKEND_IP }}" > .env
          
          # Chatbot (Sin puerto 5678)
          echo "VITE_N8N_WEBHOOK_URL=https://${{ secrets.BACKEND_IP }}/webhook/2f4e8def-1604-43d9-a0c4-5677de10f699/chat" >> .env
          
          # Formulario (Sin puerto 5678)
          echo "VITE_N8N_FORM_URL=https://${{ secrets.BACKEND_IP }}/form/fb9dd885-a08a-4146-a96a-5664b3560d7c" >> .env

      - name: 5. Construir el proyecto (Generar carpeta dist)
        run: npm run build

      - name: 6. Subir la carpeta dist a AWS EC2 por SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/frontend"
          strip_components: 1