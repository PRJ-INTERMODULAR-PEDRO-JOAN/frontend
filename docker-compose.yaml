version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dev-frontend
    ports:
      - "5174:5174"
    volumes:
      # Monta tu carpeta actual (.) en la carpeta /app del contenedor
      - .:/app
      # Volumen anónimo para aislar los node_modules. 
      # Esto evita que si tienes una carpeta node_modules de Windows/Mac se mezcle con la de Linux del contenedor.
      - /app/node_modules
    # Aquí está la clave: al arrancar, instala dependencias y luego lanza Vite
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"