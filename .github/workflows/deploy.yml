name: Deploy Frontend Vue a AWS EC2

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: 3. Instalar dependencias
        run: npm ci

      - name: 4. Escanear y corregir IPs en el código
        run: |
          echo "Limpiando referencias antiguas o incorrectas..."
          
          # 1. Cambiar 'localhost' por la IP del Backend
          find src/ -type f \( -name "*.js" -o -name "*.vue" \) -exec sed -i 's/localhost/${{ secrets.BACKEND_IP }}/g' {} +
          find . -maxdepth 1 -type f -name ".env*" -exec sed -i 's/localhost/${{ secrets.BACKEND_IP }}/g' {} +
          
          # 2. Cambiar la IP del Frontend (3.81.245.213) por la IP del Backend
          # Esto arreglará cualquier archivo donde hayas puesto la IP equivocada a fuego
          find src/ -type f \( -name "*.js" -o -name "*.vue" \) -exec sed -i 's/3.81.245.213/${{ secrets.BACKEND_IP }}/g' {} +
          find . -maxdepth 1 -type f -name ".env*" -exec sed -i 's/3.81.245.213/${{ secrets.BACKEND_IP }}/g' {} +

      # (Opcional pero recomendado): Asegurarnos de que el puerto de n8n se inyecta bien
      - name: 4.5. Forzar variables de entorno correctas
        run: |
          echo "VITE_API_URL=http://${{ secrets.BACKEND_IP }}.nip.io" > .env
          echo "VITE_N8N_WEBHOOK_URL=http://${{ secrets.BACKEND_IP }}:5678/webhook/2f4e8def-1604-43d9-a0c4-5677de10f699/chat" >> .env

      - name: 5. Construir el proyecto (Generar carpeta dist)
        run: npm run build

      - name: 6. Subir la carpeta dist a AWS EC2 por SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/frontend"
          strip_components: 1