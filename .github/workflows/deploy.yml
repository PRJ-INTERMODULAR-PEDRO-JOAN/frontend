name: Deploy Frontend Vue a AWS EC2

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: 3. Instalar dependencias
        run: npm ci

      # Ya no hace falta el paso de reemplazar localhost por IPs duras!
      - name: 4. Construir el proyecto (Generar carpeta dist)
        run: npm run build

      - name: 5. Subir la carpeta dist a AWS EC2 por SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/frontend"
          strip_components: 1