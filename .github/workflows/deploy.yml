name: Frontend CI/CD Pipeline

on:
  push:
    branches:
      - main # O la rama que prefieras para el paso a producción

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Basado en el "engines" de tu package.json
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci # Instalación limpia y segura

      # NOTA: Tu package.json actual no tiene un script de test. 
      # Si añades uno (ej. "test": "vitest"), descomenta la siguiente línea:
      # - name: Ejecutar Tests
      #   run: npm run test

      - name: Construir el proyecto (Build)
        run: npm run build

      - name: Desplegar al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          # Carpeta de destino en tu servidor
          target: "/var/www/frontend"
          # Evita crear la estructura completa de carpetas del repo, sube solo el contenido
          strip_components: 1