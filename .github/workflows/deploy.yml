name: Deploy Frontend Vue a AWS EC2

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: 3. Instalar dependencias
        run: npm ci

      - name: 4. Escanear y corregir referencias en el código
        run: |
          echo "Limpiando referencias antiguas o incorrectas..."
          
          # 1. Cambiar 'localhost' por el dominio de la API
          find src/ -type f \( -name "*.js" -o -name "*.vue" \) -exec sed -i 's/localhost/${{ secrets.BACKEND_IP }}/g' {} +
          find . -maxdepth 1 -type f -name ".env*" -exec sed -i 's/localhost/${{ secrets.BACKEND_IP }}/g' {} +
          
          # 2. Cambiar la IP antigua por el dominio de la API
          find src/ -type f \( -name "*.js" -o -name "*.vue" \) -exec sed -i 's/3.81.245.213/${{ secrets.BACKEND_IP }}/g' {} +
          find . -maxdepth 1 -type f -name ".env*" -exec sed -i 's/3.81.245.213/${{ secrets.BACKEND_IP }}/g' {} +

      - name: 4.5. Forzar variables de entorno correctas (Todo por HTTPS seguro)
        run: |
          # 1. API principal
          echo "VITE_API_URL=https://${{ secrets.BACKEND_IP }}" > .env
          
          # 2. Webhook de n8n (Sin el puerto 5678, Nginx hará el proxy invisible)
          echo "VITE_N8N_WEBHOOK_URL=https://${{ secrets.BACKEND_IP }}/webhook/2f4e8def-1604-43d9-a0c4-5677de10f699/chat" >> .env

      - name: 5. Construir el proyecto (Generar carpeta dist)
        run: npm run build

      - name: 6. Subir la carpeta dist a AWS EC2 por SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/frontend"
          strip_components: 1