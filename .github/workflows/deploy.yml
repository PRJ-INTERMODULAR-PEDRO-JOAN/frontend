name: Deploy Frontend Vue a AWS EC2

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' 
          cache: 'npm'

      - name: 3. Instalar dependencias
        run: npm ci

      # --- PASO AÑADIDO: Reemplazar localhost por IP y puerto 80 ---
      - name: 4. Cambiar localhost por la IP del Backend
        run: |
          echo "Reemplazando 'localhost' por '${{ secrets.BACKEND_IP }}:80' en el código fuente..."
          find src/ -type f \( -name "*.js" -o -name "*.vue" \) -exec sed -i 's/localhost/${{ secrets.BACKEND_IP }}:80/g' {} +
      # --------------------------------------------------------------

      - name: 5. Construir el proyecto (Generar carpeta dist)
        run: npm run build

      - name: 6. Subir la carpeta dist a AWS EC2 por SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/frontend"
          strip_components: 1